name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Configure Capacitor to Root
        run: |
          # إنشاء ملف الإعدادات ليشير إلى المجلد الرئيسي "." حيث يوجد الـ index.html الخاص بك
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.unified.code.editor",
            "appName": "Unified Code Editor",
            "webDir": ".",
            "bundledWebRuntime": false
          }
          EOF

          # مسح أي بناء قديم لضمان تحديث الكود
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build Android Project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Unified-Code-Editor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
