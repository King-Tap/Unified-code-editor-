name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor and Build
        run: |
          # بناء ملفات الويب أولاً (تأكد أن هذا الأمر موجود في package.json)
          npm run build --if-present
          
          # إنشاء مجلد www وهمي إذا فشل أمر البناء أعلاه لضمان عمل Capacitor
          mkdir -p www
          
          # تهيئة Capacitor إذا لم يكن مهيأً
          npx cap init "Unified Code Editor" "com.unified.code.editor" --web-dir www --force
          
          # إضافة منصة أندرويد (هذا هو السطر الذي كان ينقصك)
          npx cap add android || echo "Android already exists"
          npx cap sync android

      - name: Build Android Project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Unified-Code-Editor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
