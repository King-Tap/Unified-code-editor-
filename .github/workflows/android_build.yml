name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4 # تحديث لنسخة v4

      - name: Set up Node.js
        uses: actions/use-node@v4 # تحديث لنسخة v4
        with:
          node-version: 20 # استخدام نسخة مستقرة حديثة

      - name: Set up JDK 17 # خطوة جوهرية لمنع فشل البناء
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Initialize Capacitor
        run: |
          npx cap init "Unified Code Editor" "com.unified.code.editor" --web-dir .
          npx cap add android

      - name: Build Android Project
        run: |
          npx cap copy
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # تحديث لنسخة v4
        with:
          name: Unified-Code-Editor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
