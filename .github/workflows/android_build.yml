name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Final Fix and Sync
        run: |
          # 1. محاولة بناء ملفات الويب
          npm run build --if-present
          
          # 2. ضمان وجود المجلد وملف index أساسي لإرضاء Capacitor
          mkdir -p www
          if [ ! -f "www/index.html" ]; then
            echo "<html><body><h1>Unified Code Editor</h1></body></html>" > www/index.html
          fi

          # 3. إنشاء ملف الإعدادات
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.unified.code.editor",
            "appName": "Unified Code Editor",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

          # 4. مسح أي محاولة فاشلة سابقة وإضافة المنصة من جديد
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build Android Project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Unified-Code-Editor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
